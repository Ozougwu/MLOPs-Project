# Project parameters — Online Shoppers MLOps

target_column: Revenue

# ── Split (test sealed; CV on train handles validation) ───────
split:
  test_fraction: 0.2
  random_state: 42

# ── Model selection (cross-validated on train only) ───────────
model_selection:
  cv_folds: 5
  scoring: roc_auc          # threshold-independent; imbalanced data
  random_state: 42
  class_weight: balanced    # handle ~15.5% buyer imbalance, no synthetic data

# ── Candidate hyperparameters (kept modest; Optuna is a stretch) ─
candidates:
  logistic_regression:
    max_iter: 1000
    C: 1.0
  random_forest:
    n_estimators: 200
    max_depth: 12
  gradient_boosting:
    n_estimators: 200
    max_depth: 3
    learning_rate: 0.1

# ── Optuna HPO (creative extension; optional, isolated) ───────
# Only used by the model_optimisation pipeline. The required path ignores it
# and uses the fixed `candidates` above, so reproducibility is unaffected.
optuna:
  n_trials: 30              # TPE is sample-efficient; 30 trials suffice here

# ── MLflow ────────────────────────────────────────────────────
mlflow:
  registered_model_name: online_shoppers_champion
