# Base (committed) kedro-mlflow config — safe to version (no secrets here).
# Local overrides / credentials live in conf/local/mlflow.yml (gitignored).
# This file guarantees a grader who clones the repo gets a working MLflow setup
# (requirement: "everyone should be able to run their pipeline and reproduce results").

server:
  mlflow_tracking_uri: mlruns  # relative to project root; local file store
  mlflow_registry_uri: null    # falls back to tracking uri (model registry)
  credentials: null

tracking:
  disable_tracking:
    disable_autologging: True  # we call mlflow.sklearn.autolog() explicitly in model_train
    pipelines: []
  experiment:
    name: online_shoppers
    restore_if_deleted: True
  run:
    id: null
    name: null  # defaults to the pipeline name
    nested: True
  params:
    dict_params:
      flatten: False
      recursive: True
      sep: "."
    long_params_strategy: fail

ui:
  port: "5000"
  host: "127.0.0.1"
